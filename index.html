<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Stardust X Messenger</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, addDoc, serverTimestamp, arrayUnion, arrayRemove, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC0v1HVCDfyO-nFdBJChpcB3ZxDOlCtFuQ",
            authDomain: "stardust-chat-1656d.firebaseapp.com",
            databaseURL: "https://stardust-chat-1656d-default-rtdb.firebaseio.com",
            projectId: "stardust-chat-1656d",
            storageBucket: "stardust-chat-1656d.firebasestorage.app",
            messagingSenderId: "676902329820",
            appId: "1:676902329820:web:576bb7bc0e6c9d3e0c4319",
            measurementId: "G-31GVGLYZDL"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const IMGBB_API_KEY = "550a3bcd47c1b0a86a9f2ba7a41770b6";

        window.db = db;
        window.auth = auth;
        window.IMGBB_API_KEY = IMGBB_API_KEY;
        window.serverTimestamp = serverTimestamp;
        window.arrayUnion = arrayUnion;
        window.arrayRemove = arrayRemove;
        window.increment = increment;
        window.collection = collection;
        window.doc = doc;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
        window.getDocs = getDocs;
        window.updateDoc = updateDoc;
        window.deleteDoc = deleteDoc;
        window.query = query;
        window.where = where;
        window.orderBy = orderBy;
        window.onSnapshot = onSnapshot;
        window.addDoc = addDoc;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #1a1a2e; height: 100vh; overflow: hidden; user-select: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #c8d6e5; border-radius: 10px; }

        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f5f7fa; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        #loadingScreen.hidden { display: none; }
        .loader-spinner { width: 60px; height: 60px; border: 3px solid #e8f0fe; border-top: 3px solid #00b894; border-radius: 50%; animation: spin 1s linear infinite; }
        .loader-text { margin-top: 20px; font-size: 18px; font-weight: 300; letter-spacing: 4px; color: #00b894; }
        .loader-sub { margin-top: 8px; font-size: 12px; color: #8395a7; letter-spacing: 2px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f5f7fa; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        #loginScreen.hidden { display: none; }
        .login-container { width: 100%; max-width: 380px; padding: 40px 24px; background: white; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .login-logo { text-align: center; margin-bottom: 40px; }
        .login-logo svg { width: 60px; height: 60px; }
        .login-logo h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; margin-top: 12px; letter-spacing: 2px; }
        .login-logo span { color: #00b894; }
        .login-logo p { color: #8395a7; font-size: 13px; margin-top: 4px; letter-spacing: 1px; }
        .login-input { width: 100%; padding: 14px 18px; background: #f8f9fa; border: 2px solid #e8f0fe; border-radius: 12px; color: #1a1a2e; font-size: 15px; margin-bottom: 14px; outline: none; }
        .login-input:focus { border-color: #00b894; }
        .login-btn { width: 100%; padding: 14px; background: #00b894; border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .login-toggle { text-align: center; margin-top: 16px; color: #8395a7; font-size: 14px; }
        .login-toggle a { color: #00b894; cursor: pointer; font-weight: 500; }
        .login-error { color: #e74c6f; font-size: 13px; text-align: center; margin-top: 8px; min-height: 20px; }

        #app { display: none; height: 100vh; flex-direction: column; background: #f5f7fa; }
        #app.active { display: flex; }

        .app-header { padding: 16px 20px; background: white; border-bottom: 1px solid #e8f0fe; display: flex; justify-content: space-between; align-items: center; min-height: 60px; flex-shrink: 0; }
        .app-header .title { font-size: 18px; font-weight: 600; color: #1a1a2e; letter-spacing: 0.5px; }
        .app-header .title span { color: #00b894; }

        .app-content { flex: 1; overflow-y: auto; padding: 0; }

        .bottom-nav { display: flex; background: white; border-top: 1px solid #e8f0fe; flex-shrink: 0; padding: 8px 0 env(safe-area-inset-bottom, 8px) 0; }
        .bottom-nav .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4px 0; cursor: pointer; gap: 2px; }
        .bottom-nav .nav-item svg { width: 26px; height: 26px; fill: none; stroke: #a0aec0; stroke-width: 2; }
        .bottom-nav .nav-item.active svg { stroke: #00b894; }
        .bottom-nav .nav-item .nav-label { font-size: 10px; color: #a0aec0; }
        .bottom-nav .nav-item.active .nav-label { color: #00b894; }
        .nav-badge { position: absolute; top: 2px; right: 50%; transform: translateX(calc(50% + 18px)); background: #e74c6f; color: #fff; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 50%; display: flex; justify-content: center; align-items: center; padding: 0 5px; }

        .chat-item, .contact-item { display: flex; align-items: center; padding: 12px 20px; cursor: pointer; background: white; border-bottom: 1px solid #e8f0fe; }
        .chat-item .avatar, .contact-item .avatar { width: 48px; height: 48px; border-radius: 50%; background: #e8f0fe; overflow: hidden; margin-right: 14px; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: 600; color: #00b894; }
        .chat-item .avatar img, .contact-item .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .empty-state { padding: 60px 20px; text-align: center; color: #8395a7; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 300; display: none; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; border-radius: 20px; padding: 28px 24px; max-width: 400px; width: 90%; max-height: 80vh; overflow-y: auto; }

        .chat-message { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 14px; position: relative; }
        .chat-message.sent { align-self: flex-end; background: #00b894; color: #fff; }
        .chat-message.received { align-self: flex-start; background: white; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        .chat-message .msg-time { font-size: 10px; margin-top: 4px; text-align: right; }
        .chat-message.received .msg-time { color: #a0aec0; }

        .chat-input-area { padding: 12px 16px; background: white; border-top: 1px solid #e8f0fe; display: flex; align-items: center; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 10px 16px; background: #f8f9fa; border: 2px solid #e8f0fe; border-radius: 24px; font-size: 14px; }
        .send-btn { background: #00b894; border: none; border-radius: 50%; width: 42px; height: 42px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .send-btn svg { width: 20px; height: 20px; stroke: #fff; stroke-width: 2; }

        .context-menu { position: fixed; background: white; border: 1px solid #e8f0fe; border-radius: 12px; padding: 6px 0; z-index: 200; min-width: 180px; display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        .context-menu.active { display: block; }
        .context-menu .menu-item { padding: 10px 18px; font-size: 14px; color: #1a1a2e; cursor: pointer; display: flex; align-items: center; gap: 10px; border: none; background: none; width: 100%; text-align: left; }
        .context-menu .menu-item.danger { color: #e74c6f; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="loader-spinner"></div>
        <div class="loader-text">STARDUST X</div>
        <div class="loader-sub">connecting to the universe...</div>
    </div>

    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-container">
            <div class="login-logo">
                <svg viewBox="0 0 24 24" width="60" height="60">
                    <circle cx="12" cy="12" r="10" stroke="#00b894" stroke-width="2" fill="none"/>
                    <path d="M12 2 L12 22 M2 12 L22 12" stroke="#00b894" stroke-width="2"/>
                    <circle cx="12" cy="12" r="3" fill="#00b894"/>
                </svg>
                <h1>Stardust <span>X</span></h1>
                <p>messenger for the stars</p>
            </div>
            <input type="email" id="loginEmail" class="login-input" placeholder="Email address" />
            <input type="password" id="loginPassword" class="login-input" placeholder="Password" />
            <div class="login-error" id="loginError"></div>
            <button class="login-btn" id="loginBtn">Sign In</button>
            <div class="login-toggle">
                Don't have an account? <a id="toggleAuth">Create one</a>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app">
        <div class="app-header">
            <div class="title" id="headerTitle">Stardust <span>X</span></div>
        </div>

        <div class="app-content" id="appContent">
            <!-- Chat List -->
            <div id="chatList" class="chat-list"></div>
            
            <!-- Contacts -->
            <div id="contactsView" class="contacts-container hidden">
                <div class="contacts-search" style="padding:12px 20px; display:flex; gap:10px; align-items:center; background:white;">
                    <svg width="20" height="20" fill="none" stroke="#a0aec0" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="contactSearch" placeholder="Search contacts..." style="flex:1; padding:10px 16px; border:2px solid #e8f0fe; border-radius:10px;" />
                </div>
                <div id="contactsList"></div>
            </div>
            
            <!-- Moments -->
            <div id="momentsView" class="moments-container hidden">
                <div style="padding:12px 20px; display:flex; justify-content:flex-end; background:white;">
                    <button id="createMomentBtn" style="background:#00b894; border:none; border-radius:50%; width:44px; height:44px; display:flex; justify-content:center; align-items:center; cursor:pointer;">
                        <svg width="24" height="24" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                </div>
                <div id="momentsList"></div>
            </div>
            
            <!-- Profile -->
            <div id="profileView" class="profile-container hidden" style="padding:20px; background:white; margin:8px 16px; border-radius:16px;">
                <div style="display:flex; align-items:center; gap:16px; margin-bottom:20px;">
                    <div class="profile-avatar" id="profileAvatar" style="width:80px; height:80px; border-radius:50%; background:#e8f0fe; overflow:hidden; border:3px solid #00b894; display:flex; justify-content:center; align-items:center; font-size:32px; font-weight:700; color:#00b894; cursor:pointer;">
                        <span id="profileInitials">U</span>
                    </div>
                    <div style="flex:1;">
                        <div id="profileNameDisplay" style="font-size:20px; font-weight:600;">User</div>
                        <div id="profileBioDisplay" style="color:#8395a7; font-size:14px;">No bio</div>
                        <div id="profileUidDisplay" style="font-size:12px; color:#a0aec0; background:#f8f9fa; padding:4px 12px; border-radius:12px; display:inline-block; margin-top:4px;">UID: loading...</div>
                    </div>
                    <button id="profileEditBtn" style="background:none; border:none; cursor:pointer; padding:8px;">
                        <svg width="20" height="20" fill="none" stroke="#00b894" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                </div>
                <input type="file" id="profilePhotoInput" accept="image/*" style="display:none;" />
                <div style="display:flex; gap:12px; justify-content:center; margin-top:16px;">
                    <button id="logoutBtn" style="padding:8px 24px; border:none; border-radius:10px; background:#e8f0fe; color:#1a1a2e; cursor:pointer;">Logout</button>
                </div>
                <div style="margin-top:20px; border-top:1px solid #e8f0fe; padding-top:16px;">
                    <div style="font-size:16px; font-weight:600; margin-bottom:12px;">Friends</div>
                    <div id="profileFriendsList"></div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav" id="bottomNav">
            <div class="nav-item active" data-tab="chats">
                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span class="nav-label">Chats</span>
                <span class="nav-badge hidden" id="chatBadge">0</span>
            </div>
            <div class="nav-item" data-tab="contacts">
                <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span class="nav-label">Contacts</span>
                <span class="nav-badge hidden" id="contactBadge">0</span>
            </div>
            <div class="nav-item" data-tab="moments">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <span class="nav-label">Moments</span>
            </div>
            <div class="nav-item" data-tab="profile">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="nav-label">Profile</span>
            </div>
        </div>
    </div>

    <!-- Chat Window -->
    <div id="chatWindow" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#f5f7fa; z-index:100; display:none; flex-direction:column;">
        <div class="chat-window-header" style="padding:12px 16px; background:white; border-bottom:1px solid #e8f0fe; display:flex; align-items:center;">
            <div id="chatBackBtn" style="cursor:pointer; margin-right:12px;">
                <svg width="24" height="24" fill="none" stroke="#1a1a2e" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            </div>
            <div style="flex:1; display:flex; align-items:center;">
                <div class="avatar" id="chatUserAvatar" style="width:36px; height:36px; border-radius:50%; background:#e8f0fe; margin-right:10px; display:flex; justify-content:center; align-items:center; font-weight:600; color:#00b894;">U</div>
                <div>
                    <div class="name" id="chatUserName" style="font-weight:500;">User</div>
                    <div class="status" id="chatUserStatus" style="font-size:11px; color:#a0aec0;">online</div>
                </div>
            </div>
            <div style="display:flex; gap:12px; margin-left:auto;">
                <svg id="audioCallBtn" width="22" height="22" fill="none" stroke="#4a4a5a" stroke-width="2" viewBox="0 0 24 24" style="cursor:pointer;"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                <svg id="videoCallBtn" width="22" height="22" fill="none" stroke="#4a4a5a" stroke-width="2" viewBox="0 0 24 24" style="cursor:pointer;"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages" style="flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:6px;"></div>
        <div class="chat-input-area">
            <button id="chatAttachmentBtn" style="background:none; border:none; font-size:20px; cursor:pointer; color:#8395a7;">+</button>
            <input type="file" id="chatImageInput" accept="image/*" style="display:none;" />
            <input type="text" id="chatInput" placeholder="Type a message..." style="flex:1; padding:10px 16px; background:#f8f9fa; border:2px solid #e8f0fe; border-radius:24px;" />
            <button class="send-btn" id="chatSendBtn">
                <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </div>

    <!-- Context Menu -->
    <div class="context-menu" id="contextMenu">
        <button class="menu-item" data-action="react">React</button>
        <button class="menu-item" data-action="copy">Copy</button>
        <button class="menu-item" data-action="reply">Reply</button>
        <button class="menu-item" data-action="forward">Forward</button>
        <button class="menu-item" data-action="edit">Edit</button>
        <button class="menu-item danger" data-action="delete">Delete for Everyone</button>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent">
            <h3 id="modalTitle">Modal</h3>
            <div id="modalBody"></div>
            <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:8px;">
                <button class="secondary-btn" id="modalCancel" style="padding:10px 24px; border:none; border-radius:10px; background:#e8f0fe; cursor:pointer;">Cancel</button>
                <button class="primary-btn" id="modalConfirm" style="padding:10px 24px; border:none; border-radius:10px; background:#00b894; color:white; cursor:pointer;">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Call Screen -->
    <div id="callScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0a0a0f; z-index:500; display:none; flex-direction:column; justify-content:center; align-items:center;">
        <div class="call-avatar" id="callAvatar" style="width:120px; height:120px; border-radius:50%; background:#1a1a2e; overflow:hidden; border:3px solid #00b894; margin-bottom:20px; display:flex; justify-content:center; align-items:center; font-size:48px; font-weight:700; color:#00b894;">
            <span id="callInitials">U</span>
        </div>
        <div class="call-name" id="callName" style="font-size:24px; font-weight:600; color:white; margin-bottom:4px;">User</div>
        <div class="call-status" id="callStatus" style="font-size:14px; color:#8395a7; margin-bottom:40px;">Calling...</div>
        <div style="display:flex; gap:20px; align-items:center;">
            <button class="call-btn" id="callChatBtn" style="width:50px; height:50px; border-radius:50%; background:#2a2a3e; border:none; cursor:pointer; display:flex; justify-content:center; align-items:center;">
                <svg width="24" height="24" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </button>
            <button class="call-btn" id="callVideoToggleBtn" style="width:50px; height:50px; border-radius:50%; background:#2a2a3e; border:none; cursor:pointer; display:flex; justify-content:center; align-items:center;">
                <svg width="24" height="24" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            </button>
            <button class="call-btn end-call" id="callEndBtn" style="width:60px; height:60px; border-radius:50%; background:#e74c6f; border:none; cursor:pointer; display:flex; justify-content:center; align-items:center;">
                <svg width="28" height="28" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="call-reactions" id="callReactions" style="display:flex; gap:12px; margin-top:30px;">
            <button style="background:#1a1a2e; border:none; border-radius:50%; width:44px; height:44px; font-size:22px; cursor:pointer;">😊</button>
            <button style="background:#1a1a2e; border:none; border-radius:50%; width:44px; height:44px; font-size:22px; cursor:pointer;">❤️</button>
            <button style="background:#1a1a2e; border:none; border-radius:50%; width:44px; height:44px; font-size:22px; cursor:pointer;">🔥</button>
            <button style="background:#1a1a2e; border:none; border-radius:50%; width:44px; height:44px; font-size:22px; cursor:pointer;">👏</button>
            <button style="background:#1a1a2e; border:none; border-radius:50%; width:44px; height:44px; font-size:22px; cursor:pointer;">😂</button>
        </div>
    </div>

    <!-- Image Viewer Modal -->
    <div id="imageViewerModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:600; display:none; justify-content:center; align-items:center;">

        function getInitials(name) {
            if (!name) return 'U';

            return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'just now';
            if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
            if (diff < 86400000) return date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
            return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][date.getDay()];
        }

        function getTimeString(timestamp) {
            if (!timestamp) return '';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
