        // ============================================================

        function getInitials(name) {
            if (!name) return 'U';
            const parts = name.trim().split(' ');
            if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
            return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'just now';
            if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
            if (diff < 86400000) return date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
            if (diff < 604800000) return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][date.getDay()];
            return date.toLocaleDateString();
        }

        function getTimeString(timestamp) {
            if (!timestamp) return '';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
        }

        function generateUID() {
            return Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
        }

        function showModal(title, bodyHTML, confirmText = 'Confirm', onConfirm = null) {
            modalTitle.textContent = title;
            modalBody.innerHTML = bodyHTML;
            modalConfirm.textContent = confirmText;
            modalOverlay.classList.add('active');
            modalConfirm.onclick = () => {
                if (onConfirm) onConfirm();
                modalOverlay.classList.remove('active');
            };
            modalCancel.onclick = () => modalOverlay.classList.remove('active');
            modalOverlay.onclick = (e) => {
                if (e.target === modalOverlay) modalOverlay.classList.remove('active');
            };
        }

        function hideModal() {
            modalOverlay.classList.remove('active');
        }

        function showToast(msg, type = 'info') {
            // Simple toast using modal style
            showModal('Notice', `<p style="color:#e0e0e0;">${msg}</p>`, 'OK', null);

        // ============================================================
        // FRIEND REQUESTS
        // ============================================================
        async function sendFriendRequest(toUID) {
            try {
                // Check if already friends
                if (userProfile.friends && userProfile.friends.includes(toUID)) {
                    showToast('Already friends with this user');
                    return;
                }
                // Check if request already sent
                const q = query(
                    collection(db, 'friendRequests'),
                    where('from', '==', state.currentUID),
                    where('to', '==', toUID),
                    where('status', '==', 'pending')
                );
                const snap = await getDocs(q);
                if (!snap.empty) {
                    showToast('Request already sent');
                    return;
                }
                // Send request
                await addDoc(collection(db, 'friendRequests'), {
                    from: state.currentUID,
                    to: toUID,
                    status: 'pending',
                    timestamp: serverTimestamp(),
                    fromName: userProfile.name || 'User',
                });
                showToast('Friend request sent!');
                hideModal();
            } catch (err) {
                console.error('Error sending friend request:', err);
                showToast('Error sending request');
            }
        }

        function showIncomingRequests() {
            const requests = state.friendRequests.filter(r => r.to === state.currentUID && r.status === 'pending');
            if (requests.length === 0) {
                showModal('Incoming Requests', '<p style="color:#6a6a7a;">No pending requests</p>', 'Close', null);
                return;
            }
            let html = '<div style="display:flex;flex-direction:column;gap:12px;">';
            requests.forEach(req => {
                html += `
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:#0a0a0f;border-radius:10px;border:1px solid #1a1a2e;">

                        </div>
                        <div style="display:flex;gap:8px;">
                            <button class="req-accept" data-uid="${req.from}" style="background:#6c5ce7;border:none;color:#fff;padding:6px 16px;border-radius:8px;cursor:pointer;">Accept</button>
                            <button class="req-deny" data-uid="${req.from}" style="background:#2a2a3e;border:none;color:#e0e0e0;padding:6px 16px;border-radius:8px;cursor:pointer;">Deny</button>

                    await acceptFriendRequest(uid);

                    const uid = btn.dataset.uid;
                    await denyFriendRequest(uid);
                    hideModal();
                    showIncomingRequests();
                });
            });
        }

        async function acceptFriendRequest(fromUID) {
            try {
                // Update request status
                const q = query(
                    collection(db, 'friendRequests'),
                    where('from', '==', fromUID),
                    where('to', '==', state.currentUID),
                    where('status', '==', 'pending')
                );
                const snap = await getDocs(q);
                snap.forEach(async (docSnap) => {
                    await updateDoc(doc(db, 'friendRequests', docSnap.id), { status: 'accepted' });
                });
                // Add to friends lists
                await updateDoc(doc(db, 'users', state.currentUID), {
                    friends: arrayUnion(fromUID)
                });
                await updateDoc(doc(db, 'users', fromUID), {
                    friends: arrayUnion(state.currentUID)
                });
                // Get friend's name for popup
                const friendDoc = await getDoc(doc(db, 'users', fromUID));
                const friendName = friendDoc.exists() ? friendDoc.data().name || 'User' : 'User';
                // Ask for custom name
                showModal('Contact Saved', `
                    <p style="color:#e0e0e0;margin-bottom:12px;">${friendName} is now your contact!</p>
                    <input type="text" id="customNameInput" placeholder="Set a custom name (optional)" style="width:100%;padding:12px;background:#0a0a0f;border:1px solid #2a2a3e;border-radius:10px;color:#e0e0e0;font-size:14px;outline:none;" />
                `, 'Save', async () => {
                    const customName = document.getElementById('customNameInput').value.trim();
                    if (customName) {
                        // Save custom name in user's contact list
                        const contactRef = doc(db, 'users', state.currentUID, 'contacts', fromUID);
                        await setDoc(contactRef, { name: customName }, { merge: true });
                    }
                    showToast('Contact added!');
                    hideModal();
                });
                // Update local state
                if (!userProfile.friends) userProfile.friends = [];
                if (!userProfile.friends.includes(fromUID)) {
                    userProfile.friends.push(fromUID);
                }
                renderContacts();
                renderProfileFriends();
                updateBadges();
            } catch (err) {
                console.error('Error accepting friend request:', err);
                showToast('Error accepting request');
            }
        }

        async function denyFriendRequest(fromUID) {
            try {
                const q = query(

        // ============================================================
        // CONTACTS
        // ============================================================
        function renderContacts() {
            const search = contactSearch.value.toLowerCase();
            const friends = userProfile.friends || [];
            if (friends.length === 0) {
                contactsList.innerHTML = `<div style="padding:40px 20px;text-align:center;color:#4a4a5a;">No contacts yet<br/><span style="font-size:13px;">Add friends using the menu above</span></div>`;
                return;
            }
            // Group by first letter
            const groups = {};
            friends.forEach(async (uid) => {
                try {
                    const docRef = doc(db, 'users', uid);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        // Check for custom name
                        const contactDoc = await getDoc(doc(db, 'users', state.currentUID, 'contacts', uid));
                        let name = data.name || 'User';
                        if (contactDoc.exists() && contactDoc.data().name) {
                            name = contactDoc.data().name;
                        }
                        const letter = name.charAt(0).toUpperCase();
                        if (!groups[letter]) groups[letter] = [];
                        groups[letter].push({ uid, name, data });
                    }
                } catch (err) {
                    console.error('Error loading contact:', err);
                }
            });
            // Wait a bit and render
            setTimeout(() => {
                let html = '';
                const sortedLetters = Object.keys(groups).sort();
                sortedLetters.forEach(letter => {
                    const items = groups[letter].filter(item => 
                        item.name.toLowerCase().includes(search)
                    );
                    if (items.length === 0) return;
                    html += `<div class="contact-section"><div class="section-letter">${letter}</div>`;
                    items.sort((a,b) => a.name.localeCompare(b.name));
                    items.forEach(item => {
                        html += `
                            <div class="contact-item" data-uid="${item.uid}">
                                <div class="avatar">
                                    ${item.data.photoURL ? `<img src="${item.data.photoURL}" />` : `<div class="initials">${getInitials(item.name)}</div>`}
                                </div>
                                <div>
                                    <div class="contact-name">${item.name}</div>
                                    <div class="contact-uid">${item.uid}</div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                });
                contactsList.innerHTML = html || `<div style="padding:40px 20px;text-align:center;color:#4a4a5a;">No contacts found</div>`;
                // Add click events
                contactsList.querySelectorAll('.contact-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const uid = el.dataset.uid;
                        showContactActions(uid);
                    });
                    el.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        const uid = el.dataset.uid;
                        showContactContextMenu(e.clientX, e.clientY, uid);
                    });
                });
            }, 300);
        }

        async function blockUser(uid) {
            if (confirm('Block this user? They will be removed from your contacts.')) {
                try {
                    await updateDoc(doc(db, 'users', state.currentUID), {
                        blocked: arrayUnion(uid),
                        friends: arrayRemove(uid)
                    });
                    await updateDoc(doc(db, 'users', uid), {
                        friends: arrayRemove(state.currentUID)
                    });
                    userProfile.friends = (userProfile.friends || []).filter(f => f !== uid);
                    renderContacts();
                    renderProfileFriends();
                    showToast('User blocked');
                } catch (err) {
                    console.error('Error blocking user:', err);
                    showToast('Error blocking user');
                }
            }
        }

        async function deleteContact(uid) {
            if (confirm('Remove this contact?')) {
                try {
                    await updateDoc(doc(db, 'users', state.currentUID), {
                        friends: arrayRemove(uid)
                    });
                    await updateDoc(doc(db, 'users', uid), {
                        friends: arrayRemove(state.currentUID)
                    });
                    userProfile.friends = (userProfile.friends || []).filter(f => f !== uid);
                    renderContacts();
                    renderProfileFriends();
                    showToast('Contact removed');

                    console.error('Error removing contact:', err);
                    showToast('Error removing contact');

        // ============================================================
        // CHAT SYSTEM
        // ============================================================
        let chatListeners = [];

        async function openChat(uid) {
            state.chatPartnerId = uid;
            // Get user info
            try {
                const docRef = doc(db, 'users', uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {

                        name = contactDoc.data().name;
                    }
                    state.chatPartner = { ...data, name };
                    updateChatHeader();
                }
            } catch (err) {
                console.error('Error opening chat:', err);
                showToast('Error opening chat');
                return;
            }
            chatWindow.classList.add('active');
            await loadChatMessages(uid);

            await markMessagesRead(uid);

        function updateChatHeader() {
            const data = state.chatPartner;
            chatUserName.textContent = data.name || 'User';
            chatUserInitials.textContent = getInitials(data.name);
            if (data.photoURL) {
                chatUserAvatar.innerHTML = `<img src="${data.photoURL}" alt="${data.name}" />`;
            } else {
                chatUserAvatar.innerHTML = `<div class="initials">${getInitials(data.name)}</div>`;
            }

        }

        chatBackBtn.addEventListener('click', () => {
            chatWindow.classList.remove('active');
            state.chatPartnerId = null;
            state.chatPartner = null;
            // Clean up listeners
            chatListeners.forEach(unsub => unsub());
            chatListeners = [];
        });

        // ============================================================
        // LOAD CHAT MESSAGES
        // ============================================================
        async function loadChatMessages(uid) {
            // Clear previous listeners
            chatListeners.forEach(unsub => unsub());
            chatListeners = [];
            chatMessages.innerHTML = '';

            // Create a chat ID (sorted UIDs)
            const chatId = [state.currentUID, uid].sort().join('_');
            const chatRef = doc(db, 'chats', chatId);
            const messagesRef = collection(chatRef, 'messages');

            // Listen for new messages
            const q = query(messagesRef, orderBy('timestamp', 'asc'));
            const unsubscribe = onSnapshot(q, (snapshot) => {
                chatMessages.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const msg = docSnap.data();
                    msg.id = docSnap.id;
                    renderMessage(msg);
                });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, (err) => {
                console.error('Error loading messages:', err);
            });
            chatListeners.push(unsubscribe);

            // Ensure chat document exists
            try {
                await getDoc(chatRef);
            } catch {
                await setDoc(chatRef, {
                    participants: [state.currentUID, uid],
                    lastMessage: '',
                    lastMessageTime: serverTimestamp(),
                    updatedAt: serverTimestamp()
                });
            }
        }

        function renderMessage(msg) {
            const isSent = msg.sender === state.currentUID;
            const div = document.createElement('div');
            div.className = `chat-message ${isSent ? 'sent' : 'received'}`;
            div.dataset.id = msg.id;
            div.dataset.sender = msg.sender;
            
            let html = `<div>${msg.text || ''}</div>`;
            if (msg.imageURL) {
                html += `<img src="${msg.imageURL}" style="max-width:200px;border-radius:8px;margin-top:6px;" />`;
            }
            html += `<div class="msg-time">${getTimeString(msg.timestamp)}</div>`;
            if (msg.reactions && Object.keys(msg.reactions).length > 0) {
                html += `<div class="msg-reactions">`;
                Object.entries(msg.reactions).forEach(([emoji, users]) => {
                    if (users.length > 0) {
                        html += `<span>${emoji}</span>`;
                    }
                });
                html += `</div>`;
            }
            div.innerHTML = html;

            // Long press for context menu
            let pressTimer = null;
            div.addEventListener('mousedown', (e) => {
                pressTimer = setTimeout(() => {
                    state.selectedMessage = msg;
                    state.contextTarget = div;
                    showMessageContextMenu(e.clientX, e.clientY, msg, isSent);
                }, 500);
            });
            div.addEventListener('mouseup', () => clearTimeout(pressTimer));
            div.addEventListener('mouseleave', () => clearTimeout(pressTimer));
            // Touch support
            div.addEventListener('touchstart', (e) => {
                pressTimer = setTimeout(() => {
                    state.selectedMessage = msg;
                    state.contextTarget = div;
                    const touch = e.touches[0];
                    showMessageContextMenu(touch.clientX, touch.clientY, msg, isSent);
                }, 500);
            });
            div.addEventListener('touchend', () => clearTimeout(pressTimer));
            div.addEventListener('touchmove', () => clearTimeout(pressTimer));

            chatMessages.appendChild(div);
        }

        // ============================================================
        // SEND MESSAGE
        // ============================================================
        async function sendMessage(text, imageURL = null) {
            if (!text && !imageURL) return;
            if (!state.chatPartnerId) return;

            const chatId = [state.currentUID, state.chatPartnerId].sort().join('_');
            const chatRef = doc(db, 'chats', chatId);
            const messagesRef = collection(chatRef, 'messages');

            try {
                await addDoc(messagesRef, {
                    sender: state.currentUID,
                    receiver: state.chatPartnerId,
                    text: text || '',
                    imageURL: imageURL || '',
                    timestamp: serverTimestamp(),
                    reactions: {},
                    readBy: [state.currentUID],
                });
                // Update last message
                await updateDoc(chatRef, {
                    lastMessage: text || '📷 Image',
                    lastMessageTime: serverTimestamp(),
                    updatedAt: serverTimestamp(),
                });
                // Update chat list for both users
                await updateUserChatList(state.chatPartnerId, chatId, text || '📷 Image');
                chatInput.value = '';
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } catch (err) {
                console.error('Error sending message:', err);
                showToast('Error sending message');
            }
        }

        async function updateUserChatList(uid, chatId, lastMsg) {
            try {
                await setDoc(doc(db, 'users', uid, 'chats', chatId), {
                    chatId: chatId,
                    lastMessage: lastMsg,
                    lastMessageTime: serverTimestamp(),
                    unreadCount: increment(1),
                    updatedAt: serverTimestamp(),
                }, { merge: true });
                await setDoc(doc(db, 'users', state.currentUID, 'chats', chatId), {
                    chatId: chatId,
                    lastMessage: lastMsg,
                    lastMessageTime: serverTimestamp(),
                    updatedAt: serverTimestamp(),
                }, { merge: true });
            } catch (err) {
                console.error('Error updating chat list:', err);
            }
        }

        chatSendBtn.addEventListener('click', () => {
            const text = chatInput.value.trim();
            if (text) sendMessage(text);
        });

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatSendBtn.click();
            }
        });

        // ============================================================
        // MARK MESSAGES AS READ
        // ============================================================
        async function markMessagesRead(uid) {
            const chatId = [state.currentUID, uid].sort().join('_');
            try {
                // Update unread count in user's chat list
                const chatListRef = doc(db, 'users', state.currentUID, 'chats', chatId);
                await updateDoc(chatListRef, { unreadCount: 0 });

                console.error('Error marking messages read:', err);

        // ============================================================
        // MESSAGE CONTEXT MENU
        // ============================================================
        function showMessageContextMenu(x, y, msg, isSent) {
            const menuItems = [];
            menuItems.push({ action: 'react', label: '😊 React', show: true });
            menuItems.push({ action: 'copy', label: '📋 Copy', show: true });
            menuItems.push({ action: 'reply', label: '↩️ Reply', show: true });
            menuItems.push({ action: 'forward', label: '➡️ Forward', show: true });
            if (isSent) {
                menuItems.push({ action: 'edit', label: '✏️ Edit', show: true });
            }
            menuItems.push({ action: 'delete', label: '🗑️ Delete', show: true, danger: true });

            let html = '<div style="display:flex;flex-direction:column;gap:2px;">';
            menuItems.forEach(item => {
                if (!item.show) return;
                html += `<button class="msg-ctx-btn" data-action="${item.action}" style="background:#1a1a2e;border:none;color:${item.danger ? '#e74c6f' : '#e0e0e0'};padding:10px 16px;border-radius:6px;cursor:pointer;text-align:left;font-size:14px;width:100%;">${item.label}</button>`;
            });
            html += '</div>';
            showModal('Message Options', html, 'Cancel', null);
            document.querySelectorAll('.msg-ctx-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    hideModal();
                    const action = btn.dataset.action;
                    handleMessageAction(action, msg);
                });
            });
        }

        async function handleMessageAction(action, msg) {
            const chatId = [state.currentUID, state.chatPartnerId].sort().join('_');
            const msgRef = doc(db, 'chats', chatId, 'messages', msg.id);

            switch (action) {
                case 'react':
                    showReactionPicker(msg);
                    break;
                case 'copy':
                    navigator.clipboard.writeText(msg.text || '');
                    showToast('Copied to clipboard');
                    break;
                case 'reply':
                    chatInput.value = `> ${msg.text}\n`;
                    chatInput.focus();
                    break;
                case 'forward':
                    await forwardMessage(msg);
                    break;
                case 'edit':
                    if (msg.sender === state.currentUID) {
                        showEditMessageModal(msg);
                    }
                    break;
                case 'delete':
                    if (confirm('Delete this message?')) {
                        await deleteDoc(msgRef);
                        showToast('Message deleted');
                    }
                    break;
            }
        }

        function showReactionPicker(msg) {
            const emojis = ['😊', '❤️', '🔥', '👏', '😂', '😮', '😢', '🙏'];
            let html = '<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">';
            emojis.forEach(emoji => {
                html += `<button class="reaction-btn" data-emoji="${emoji}" style="background:#1a1a2e;border:none;font-size:28px;padding:8px 12px;border-radius:10px;cursor:pointer;transition:all 0.2s;">${emoji}</button>`;
            });
            html += '</div>';
            showModal('React', html, 'Cancel', null);
            document.querySelectorAll('.reaction-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const emoji = btn.dataset.emoji;
                    await addReaction(msg, emoji);
                    hideModal();
                });
            });
        }

        async function addReaction(msg, emoji) {
            const chatId = [state.currentUID, state.chatPartnerId].sort().join('_');
            const msgRef = doc(db, 'chats', chatId, 'messages', msg.id);
            try {
                const docSnap = await getDoc(msgRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const reactions = data.reactions || {};
                    if (!reactions[emoji]) reactions[emoji] = [];
                    if (reactions[emoji].includes(state.currentUID)) {
                        reactions[emoji] = reactions[emoji].filter(u => u !== state.currentUID);
                        if (reactions[emoji].length === 0) delete reactions[emoji];
                    } else {
                        reactions[emoji].push(state.currentUID);
                    }
                    await updateDoc(msgRef, { reactions });
                }
            } catch (err) {
                console.error('Error adding reaction:', err);
                showToast('Error adding reaction');
            }
        }

        async function forwardMessage(msg) {
            const friends = userProfile.friends || [];
            if (friends.length === 0) {
                showToast('No contacts to forward to');
                return;
            }
            let html = '<div style="max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;">';
            for (const uid of friends) {
                try {
                    const docRef = doc(db, 'users', uid);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        const name = data.name || 'User';
                        html += `<button class="forward-contact" data-uid="${uid}" style="background:#1a1a2e;border:none;color:#e0e0e0;padding:10px 16px;border-radius:8px;cursor:pointer;text-align:left;font-size:14px;">${name}</button>`;
                    }
                } catch (err) {
                    console.error('Error loading contact:', err);
                }
            }
            html += '</div>';
            showModal('Forward To', html, 'Cancel', null);
            document.querySelectorAll('.forward-contact').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const uid = btn.dataset.uid;
                    hideModal();
                    // Send the forwarded message
                    const chatId = [state.currentUID, uid].sort().join('_');
                    const chatRef = doc(db, 'chats', chatId);
                    const messagesRef = collection(chatRef, 'messages');
                    try {
                        await addDoc(messagesRef, {
                            sender: state.currentUID,
                            receiver: uid,
                            text: `📨 Forwarded: ${msg.text || ''}`,
                            imageURL: msg.imageURL || '',
                            timestamp: serverTimestamp(),
                            reactions: {},
                            readBy: [state.currentUID],
                        });
                        await updateDoc(chatRef, {
                            lastMessage: `📨 Forwarded: ${(msg.text || 'Image').substring(0, 30)}`,
                            lastMessageTime: serverTimestamp(),
                            updatedAt: serverTimestamp(),
                        });
                        showToast('Message forwarded!');
                    } catch (err) {
                        console.error('Error forwarding message:', err);
                        showToast('Error forwarding message');
                    }
                });
            });
        }

        function showEditMessageModal(msg) {
            const html = `
                <input type="text" id="editMsgInput" value="${msg.text || ''}" style="width:100%;padding:12px;background:#0a0a0f;border:1px solid #2a2a3e;border-radius:10px;color:#e0e0e0;font-size:14px;outline:none;" />
            `;
            showModal('Edit Message', html, 'Save', async () => {
                const newText = document.getElementById('editMsgInput').value.trim();
                if (newText) {
                    const chatId = [state.currentUID, state.chatPartnerId].sort().join('_');
                    const msgRef = doc(db, 'chats', chatId, 'messages', msg.id);
                    await updateDoc(msgRef, { text: newText });
                    showToast('Message updated');
                    hideModal();
                }
            });
        }

        // ============================================================
        // CHAT LIST (Main Tab)
        // ============================================================
        async function loadChatList() {
            const chatListRef = collection(db, 'users', state.currentUID, 'chats');
            const q = query(chatListRef, orderBy('updatedAt', 'desc'));
            const unsubscribe = onSnapshot(q, async (snapshot) => {
                chatList.innerHTML = '';
                let unreadTotal = 0;
                const chatPromises = [];
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    if (data.unreadCount) unreadTotal += data.unreadCount;
                    chatPromises.push(renderChatItem(data));
                });
                await Promise.all(chatPromises);
                // Update badge
                if (unreadTotal > 0) {
                    chatBadge.textContent = unreadTotal;
                    chatBadge.classList.remove('hidden');
                } else {
                    chatBadge.classList.add('hidden');
                }
                state.unreadCount = unreadTotal;
            }, (err) => {
                console.error('Error loading chat list:', err);
            });
            if (state.unsubscribers) state.unsubscribers.push(unsubscribe);
            else state.unsubscribers = [unsubscribe];
        }

        async function renderChatItem(data) {
            const chatId = data.chatId;
            const participants = chatId.split('_');
            const otherUID = participants.find(p => p !== state.currentUID);
            if (!otherUID) return;

            try {
                const docRef = doc(db, 'users', otherUID);
                const docSnap = await getDoc(docRef);
                if (!docSnap.exists()) return;
                const userData = docSnap.data();
                
                // Check for custom name
                const contactDoc = await getDoc(doc(db, 'users', state.currentUID, 'contacts', otherUID));
                let name = userData.name || 'User';
                if (contactDoc.exists() && contactDoc.data().name) {
                    name = contactDoc.data().name;
                }

                const div = document.createElement('div');
                div.className = `chat-item ${data.unreadCount > 0 ? 'highlight' : ''}`;
                div.dataset.uid = otherUID;
                
                let avatarHTML = userData.photoURL 
                    ? `<img src="${userData.photoURL}" />` 
                    : `<div class="initials">${getInitials(name)}</div>`;
                
                div.innerHTML = `
                    <div class="avatar">${avatarHTML}</div>
                    <div class="chat-info">
                        <div class="name">${name}</div>
                        <div class="last-msg">${data.lastMessage || 'Start chatting...'}</div>
                    </div>
                    <div class="chat-meta">
                        <div class="time">${formatTime(data.lastMessageTime)}</div>
                        ${data.unreadCount > 0 ? `<div class="unread">${data.unreadCount}</div>` : ''}
                    </div>
                `;
                div.addEventListener('click', () => {
                    openChat(otherUID);
                });
                div.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    showChatItemContextMenu(e.clientX, e.clientY, otherUID);
                });
                chatList.appendChild(div);
            } catch (err) {
                console.error('Error rendering chat item:', err);
            }
        }

                    <button class="chat-ctx-btn" data-action="block" style="background:#1a1a2e;border:none;color:#e74c6f;padding:10px;border-radius:6px;cursor:pointer;text-align:left;font-size:14px;">🚫 Block</button>
                    <button class="chat-ctx-btn" data-action="delete" style="background:#1a1a2e;border:none;color:#e74c6f;padding:10px;border-radius:6px;cursor:pointer;text-align:left;font-size:14px;">🗑️ Delete Chat</button>

        function startCall(type) {
            state.callType = type;
            state.callActive = true;
            const partner = state.chatPartner;
            callName.textContent = partner.name || 'User';
            callInitials.textContent = getInitials(partner.name);
            if (partner.photoURL) {
                callAvatar.innerHTML = `<img src="${partner.photoURL}" />`;
            } else {
                callAvatar.innerHTML = `<div class="initials">${getInitials(partner.name)}</div>`;
            }
            callStatus.textContent = type === 'audio' ? 'Calling...' : 'Video calling...';
            callScreen.classList.add('active');
            // Update video toggle
            callVideoToggleBtn.innerHTML = type === 'audio' 
                ? `<svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>`
                : `<svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
        }

        callEndBtn.addEventListener('click', () => {
            endCall();
        });

        function endCall() {
            state.callActive = false;
            callScreen.classList.remove('active');
            showToast('Call ended');
        }

        callVideoToggleBtn.addEventListener('click', () => {
            if (state.callType === 'audio') {
                state.callType = 'video';
                callStatus.textContent = 'Video calling...';
                callVideoToggleBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
                showToast('Switched to video');
            } else {
                state.callType = 'audio';
                callStatus.textContent = 'Calling...';
                callVideoToggleBtn.innerHTML = `<svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>`;
                showToast('Switched to audio');
            }
        });

        callChatBtn.addEventListener('click', () => {
            showToast('Chat during call (feature coming soon)');
        });

        callReactions.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                const emoji = e.target.textContent;
                showToast(`You sent ${emoji} to ${callName.textContent}`);
            }
        });

        // ============================================================
        // FRIEND REQUESTS LISTENER
        // ============================================================
        function setupRealtimeListeners() {
            if (state.unsubscribers) {
                state.unsubscribers.forEach(unsub => unsub());
                state.unsubscribers = [];
            }
            state.unsubscribers = [];

            // Friend requests
            const reqQuery = query(
                collection(db, 'friendRequests'),
                where('to', '==', state.currentUID),
                where('status', '==', 'pending')
            );
            const reqUnsub = onSnapshot(reqQuery, (snapshot) => {
                state.friendRequests = [];
                snapshot.forEach((docSnap) => {
                    state.friendRequests.push({ ...docSnap.data(), id: docSnap.id });
                });
                updateBadges();
            });
            state.unsubscribers.push(reqUnsub);

            // Load chat list
            loadChatList();
        }

        function updateBadges() {
            const pending = state.friendRequests.filter(r => r.status === 'pending').length;
            if (pending > 0) {
                contactBadge.textContent = pending;
                contactBadge.classList.remove('hidden');
                contactRequestDot.classList.add('active');
                headerBadge.textContent = pending;
                headerBadgeContainer.style.display = 'block';
            } else {
                contactBadge.classList.add('hidden');
                contactRequestDot.classList.remove('active');
                headerBadgeContainer.style.display = 'none';
            }
        }

        // ============================================================
        // SHOW USER PROFILE
        // ============================================================
        async function showUserProfile(uid) {
            try {
                const docRef = doc(db, 'users', uid);
                const docSnap = await getDoc(docRef);
                if (!docSnap.exists()) {
                    showToast('User not found');
                    return;
                }
                const data = docSnap.data();
                const name = data.name || 'User';
                const isFriend = userProfile.friends && userProfile.friends.includes(uid);
                
                let html = `
                    <div style="text-align:center;padding:10px 0;">
                        <div style="width:80px;height:80px;border-radius:50%;background:#1a1a2e;margin:0 auto 12px;overflow:hidden;border:2px solid #6c5ce7;">
                            ${data.photoURL ? `<img src="${data.photoURL}" style="width:100%;height:100%;object-fit:cover;" />` : `<div style="width:100%;height:100%;display:flex;justify-content:center;align-items:center;font-size:32px;font-weight:700;color:#6c5ce7;">${getInitials(name)}</div>`}
                        </div>
                        <div style="font-size:18px;font-weight:600;color:#e0e0e0;">${name}</div>
                        <div style="font-size:13px;color:#4a4a5a;margin:4px 0;">${data.bio || 'No bio'}</div>
                        <div style="font-size:12px;color:#4a4a5a;background:#14141e;padding:4px 16px;border-radius:12px;display:inline-block;">UID: ${uid}</div>
                        <div style="margin-top:16px;display:flex;gap:10px;justify-content:center;">
                            ${isFriend ? `<button class="profile-action-btn" data-action="msg" style="background:#6c5ce7;border:none;color:#fff;padding:8px 20px;border-radius:10px;cursor:pointer;">💬 Message</button>` : ''}
                            ${isFriend ? `<button class="profile-action-btn" data-action="remove" style="background:#2a2a3e;border:none;color:#e74c6f;padding:8px 20px;border-radius:10px;cursor:pointer;">Remove</button>` : ''}
                        </div>
                    </div>
                `;
                showModal('User Profile', html, 'Close', null);
                document.querySelectorAll('.profile-action-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        hideModal();
                        if (btn.dataset.action === 'msg') {
                            await openChat(uid);
                        } else if (btn.dataset.action === 'remove') {
                            await deleteContact(uid);
                        }
                    });
                });
            } catch (err) {
                console.error('Error loading profile:', err);
                showToast('Error loading profile');
            }
        }

        // ============================================================
        // CREATE GROUP CHAT (Simulated)
        // ============================================================
        function showCreateGroupModal() {
            const friends = userProfile.friends || [];
            if (friends.length < 2) {
                showToast('You need at least 2 friends to create a group');
                return;
            }
            let html = `
                <input type="text" id="groupNameInput" placeholder="Group name" style="width:100%;padding:12px;background:#0a0a0f;border:1px solid #2a2a3e;border-radius:10px;color:#e0e0e0;font-size:14px;outline:none;margin-bottom:12px;" />
                <div style="max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;">
            `;
            friends.forEach(uid => {
                html += `
                    <label style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:#0a0a0f;border-radius:8px;cursor:pointer;">
                        <input type="checkbox" class="group-member" value="${uid}" />
                        <span style="color:#e0e0e0;font-size:14px;">${uid.substring(0,8)}...</span>
                    </label>
                `;
            });
            html += '</div>';
            showModal('Create Group', html, 'Create', async () => {
                const name = document.getElementById('groupNameInput').value.trim() || 'Group Chat';
                const selected = document.querySelectorAll('.group-member:checked');
                if (selected.length < 2) {
                    showToast('Select at least 2 members');
                    return;
                }
                const members = Array.from(selected).map(el => el.value);
                members.push(state.currentUID);
                // Create group chat
                const groupId = generateUID();
                await setDoc(doc(db, 'groups', groupId), {
                    name: name,
                    members: members,
                    admin: state.currentUID,
                    createdAt: serverTimestamp(),
                    photoURL: '',
                });
                // Add to each member's chat list
                const chatId = `group_${groupId}`;
                for (const member of members) {
                    await setDoc(doc(db, 'users', member, 'chats', chatId), {
                        chatId: chatId,
                        lastMessage: `Group "${name}" created`,
                        lastMessageTime: serverTimestamp(),
                        unreadCount: 0,
                        isGroup: true,
                        groupId: groupId,
                        updatedAt: serverTimestamp(),
                    });
                }
                showToast('Group created!');
                hideModal();
            });
        }

        // ============================================================
        // INITIALIZATION
        // ============================================================
        // Show loading initially
        loadingScreen.classList.remove('hidden');

        console.log('🚀 Stardust X Messenger initialized');
        console.log('✨ Welcome to the stars!');

        // Handle visibility change for loading state
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && state.currentUser) {
                // App came back to foreground
                loadingScreen.classList.remove('hidden');
                setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                }, 800);
            }
        });

        // Prevent zoom on double tap
        document.addEventListener('touchend', (e) => {
            if (e.target.closest('.chat-message')) {
                // Allow context menu
            }
        });

        // ============================================================
        // EXPOSE FOR DEBUGGING
        // ============================================================
        window.__stardust = {
            state,
            userProfile,
            sendMessage,
            openChat,
            renderContacts,
            renderMoments,
        };

        console.log('✅ Stardust X is ready!');
    </script>
</body>
</html>
